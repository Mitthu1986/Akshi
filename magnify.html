<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Magnifier</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  padding: 30px;
}

#magnifier-box {
  position: absolute;
  background: #222;
  color: #00f0ff;
  border: 2px solid #00f0ff;
  padding: 10px;
  font-size: 32px;
  display: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Select text to magnify</h2>

<p>
This is your magnifier page. Select any text and it will appear bigger.
This helps visually impaired users read easily.
</p>

<div id="magnifier-box"></div>

<script>
document.addEventListener("mouseup", (e) => {
  const text = window.getSelection().toString().trim();
  const box = document.getElementById("magnifier-box");

  if (text.length > 0) {
    box.style.display = "block";
    box.innerText = text;
    box.style.left = e.pageX + 10 + "px";
    box.style.top = e.pageY + 10 + "px";
  } else {
    box.style.display = "none";
  }
});
</script>

</body>
</html>
